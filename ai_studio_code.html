<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soul Cafe - Tosh | Order Online</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root { --forest-green: #1b4332; --warm-cream: #fdf5e6; --accent-gold: #e6b17e; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--warm-cream); color: #2d2d2d; scroll-behavior: smooth; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .dish-card { transition: all 0.3s ease; border-left: 4px solid #e6b17e; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .modal-backdrop { backdrop-filter: blur(12px); background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>

    <header class="relative h-[25vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070'); filter: brightness(0.4);"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tighter">The Soul Cafe</h1>
            <p class="text-[#e6b17e] font-medium text-xs mt-1 uppercase tracking-widest">Tosh, Parvati Valley</p>
        </div>
    </header>

    <nav id="category-nav" class="sticky top-0 z-30 bg-[#1b4332] shadow-xl overflow-x-auto no-scrollbar">
        <div class="flex whitespace-nowrap px-6 py-4 gap-8 max-w-5xl mx-auto text-[11px] font-bold uppercase tracking-widest text-white/70" id="nav-items"></div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12 pb-32">
        <div class="mb-12 relative max-w-lg mx-auto">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#1b4332]"></i>
            <input type="text" id="menu-search" oninput="handleSearch()" placeholder="Search dishes (e.g. Maggi, Shake)..." class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-lg outline-none text-lg">
        </div>

        <div id="menu-sections" class="space-y-16"></div>

        <footer class="mt-24 text-center py-12 border-t border-gray-200">
            <button onclick="window.openManager()" class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-[#1b4332] transition-all">
                 Manager Access Dashboard
            </button>
        </footer>
    </main>

    <!-- FLOATING CART BUTTON -->
    <button id="cart-btn" onclick="window.openCheckout()" class="fixed bottom-8 right-8 z-40 bg-[#1b4332] text-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-4 hidden hover:scale-105 transition-transform">
        <div class="relative">
            <i data-lucide="shopping-cart"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-[#e6b17e] text-[#1b4332] text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#1b4332]">0</span>
        </div>
        <span class="font-bold">Checkout (₹<span id="cart-total">0</span>)</span>
    </button>

    <!-- CHECKOUT MODAL -->
    <div id="checkout-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeModals()"></div>
        <div class="relative w-full max-w-md bg-white rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 bg-[#1b4332] text-white flex justify-between items-center">
                <h3 class="font-bold uppercase tracking-widest">Complete Your Order</h3>
                <button onclick="closeModals()"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 mb-1 block">Your Name</label>
                    <input type="text" id="cust-name" placeholder="Enter your name" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 outline-none focus:border-[#1b4332]">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 mb-1 block">Seating Space</label>
                    <select id="cust-space" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-white">
                        <option value="Indoor Cafe 🪑">Indoor Cafe</option>
                        <option value="Open Table 🌳">Open Table</option>
                        <option value="Camp Side 🏕️">Camp Side</option>
                        <option value="Room Delivery 🏠">Room Delivery</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 mb-1 block">Special Instructions</label>
                    <textarea id="cust-notes" placeholder="e.g. less spicy, no onion..." class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 h-20 outline-none focus:border-[#1b4332]"></textarea>
                </div>
                <div class="border-t pt-4">
                    <div id="checkout-items" class="max-h-32 overflow-y-auto text-xs space-y-1 mb-4"></div>
                    <button onclick="window.confirmOrder()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> Send to WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeModals()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center text-[#1b4332]">Manager Login</h3>
            <input type="password" id="mgr-pass" placeholder="Password" class="w-full px-4 py-4 rounded-xl border-2 border-gray-100 mb-4 text-center text-xl outline-none focus:border-[#1b4332]">
            <button onclick="window.doLogin()" class="w-full bg-[#1b4332] text-white py-4 rounded-xl font-bold">Login</button>
        </div>
    </div>

    <!-- DASHBOARD MODAL -->
    <div id="manager-modal" class="fixed inset-0 z-[111] flex items-center justify-center p-0 sm:p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeModals()"></div>
        <div class="relative w-full max-w-4xl bg-white h-full sm:h-[95vh] sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 bg-[#1b4332] text-white flex justify-between items-center">
                <h3 class="font-bold uppercase tracking-widest">Dashboard Panel</h3>
                <div class="flex gap-4">
                    <button onclick="window.doLogout()" class="text-[10px] font-bold underline">Logout</button>
                    <button onclick="closeModals()" class="p-1"><i data-lucide="x"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-8 bg-[#f9f9f9]">
                <section class="bg-white p-6 rounded-2xl border">
                    <h4 class="text-xs font-black uppercase text-[#1b4332] mb-4">Category Order</h4>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="mgr-new-cat" placeholder="Category Name" class="flex-1 px-4 py-2 border rounded-lg">
                        <button onclick="window.addCategory()" class="bg-[#1b4332] text-white px-4 py-2 rounded-lg font-bold">Add</button>
                    </div>
                    <div id="mgr-sort-list" class="space-y-2"></div>
                </section>
                <section class="bg-white p-6 rounded-2xl border">
                    <h4 class="text-xs font-black uppercase text-[#1b4332] mb-4">Add Menu Item</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="dish-name" placeholder="Dish Name" class="px-4 py-2 border rounded-lg">
                        <input type="number" id="dish-price" placeholder="Price" class="px-4 py-2 border rounded-lg">
                        <select id="dish-cat" class="px-4 py-2 border rounded-lg"></select>
                        <select id="dish-veg" class="px-4 py-2 border rounded-lg">
                            <option value="true">Veg 🟢</option>
                            <option value="false">Non-Veg 🔴</option>
                        </select>
                        <textarea id="dish-desc" placeholder="Details" class="md:col-span-2 px-4 py-2 border rounded-lg"></textarea>
                    </div>
                    <button onclick="window.saveDish()" class="mt-4 w-full bg-[#e6b17e] py-3 rounded-xl font-black uppercase">Save Dish</button>
                </section>
                <div id="mgr-inventory" class="space-y-4 pb-10"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { projectId: "gen-lang-client-0775483264", apiKey: "AIzaSyBkR2MeWHwOG55lb5TkEJSeFuPfF1ZL6Vk" };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true }, "ai-studio-4ce66396-f81d-4d93-944e-3f363b09c805");

        let MENU_DATA = [];
        let CART = {};
        const MASTER_PASS = "SoulCafeTosh@2024";

        async function init() {
            onSnapshot(collection(db, "menu"), (snap) => {
                MENU_DATA = snap.docs.map(d => d.data()).sort((a,b) => a.order - b.order);
                updateUI();
            });
            lucide.createIcons();
        }

        function updateUI() {
            renderNav();
            renderMenu();
            renderManagerData();
            updateCartUI();
            lucide.createIcons();
        }

        function renderNav() {
            const nav = document.getElementById('nav-items');
            nav.innerHTML = MENU_DATA.map(c => `
                <button onclick="scrollToCat('${c.category}')" class="hover:text-white transition-colors">${c.category}</button>
            `).join('') + `<button onclick="scrollToCat('trek-section')" class="hover:text-white">Treks</button>`;
        }

        window.scrollToCat = (cat) => {
            const el = document.getElementById(`sec-${cat.replace(/\s+/g, '-')}`);
            if(el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
        };

        window.handleSearch = () => renderMenu(document.getElementById('menu-search').value.toLowerCase());

        function renderMenu(query = '') {
            const container = document.getElementById('menu-sections');
            container.innerHTML = '';
            MENU_DATA.forEach(section => {
                const items = section.items.filter(i => !i.unavailable && (i.name.toLowerCase().includes(query) || (i.desc && i.desc.toLowerCase().includes(query))));
                if (items.length === 0) return;
                const div = document.createElement('div');
                div.id = `sec-${section.category.replace(/\s+/g, '-')}`;
                div.innerHTML = `
                    <div class="flex items-center gap-4 mb-6"><h3 class="font-black text-xs uppercase tracking-widest text-[#1b4332]">${section.category}</h3><div class="h-px bg-gray-200 flex-1"></div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${items.map(item => {
                            const inCart = CART[item.name];
                            return `
                            <div class="dish-card p-6 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between mb-3">
                                        <span class="text-[8px] font-bold px-2 py-0.5 rounded ${item.isVeg ? 'bg-green-50 text-green-700':'bg-red-50 text-red-700'}">${item.isVeg ? 'VEG':'NON-VEG'}</span>
                                        <span class="font-black text-[#1b4332]">₹${item.price}</span>
                                    </div>
                                    <h4 class="font-bold text-gray-800 leading-tight">${item.name}</h4>
                                    ${item.desc ? `<p class="text-[10px] text-gray-400 mt-2 italic">${item.desc}</p>`:''}
                                </div>
                                <div class="mt-6">
                                    ${inCart ? `
                                        <div class="flex items-center justify-between bg-[#1b4332] text-white rounded-xl overflow-hidden">
                                            <button onclick="window.updateQty('${item.name}', -1)" class="px-4 py-2 hover:bg-black/10">-</button>
                                            <span class="font-bold text-xs">${inCart.qty}</span>
                                            <button onclick="window.updateQty('${item.name}', 1)" class="px-4 py-2 hover:bg-black/10">+</button>
                                        </div>
                                    ` : `
                                        <button onclick="window.addToCart('${item.name}', ${item.price})" class="w-full py-2.5 bg-[#1b4332] text-white text-[10px] font-bold rounded-xl uppercase tracking-widest">Add to Cart</button>
                                    `}
                                </div>
                            </div>`;
                        }).join('')}
                    </div>`;
                container.appendChild(div);
            });
        }

        window.addToCart = (name, price) => { CART[name] = { name, price, qty: 1 }; updateUI(); };
        window.updateQty = (name, delta) => { if (CART[name]) { CART[name].qty += delta; if (CART[name].qty <= 0) delete CART[name]; updateUI(); } };

        function updateCartUI() {
            let total = 0, count = 0;
            for (let k in CART) { total += CART[k].price * CART[k].qty; count += CART[k].qty; }
            const btn = document.getElementById('cart-btn');
            if (count > 0) { btn.classList.remove('hidden'); document.getElementById('cart-total').innerText = total; document.getElementById('cart-count').innerText = count; } 
            else { btn.classList.add('hidden'); }
        }

        window.openCheckout = () => {
            const list = document.getElementById('checkout-items');
            list.innerHTML = Object.values(CART).map(i => `<div>${i.name} x ${i.qty} (₹${i.price * i.qty})</div>`).join('');
            document.getElementById('checkout-modal').classList.remove('hidden');
        };

        // --- UPDATED WHATSAPP MESSAGE FORMAT ---
        window.confirmOrder = () => {
            const name = document.getElementById('cust-name').value.trim();
            const space = document.getElementById('cust-space').value;
            const notes = document.getElementById('cust-notes').value.trim();

            if (!name) { alert("Please enter your name"); return; }

            let itemsTxt = "";
            let grandTotal = 0;
            for (let k in CART) {
                const item = CART[k];
                itemsTxt += `• ${item.name} x ${item.qty} — ₹${item.price * item.qty}\n`;
                grandTotal += item.price * item.qty;
            }

            const message = `✨ WELCOME TO THE SOUL CAFE! ✨\n` +
                            `Thank you for your order, ${name}! 🙏\n` +
                            `━━━━━━━━━━━━━━━━━━━\n` +
                            `📝 ORDER RECEIPT\n` +
                            `• Seating: ${space}\n` +
                            `• Note: "${notes || 'None'}" 👋\n\n` +
                            `🍳 ORDER DETAILS\n` +
                            `${itemsTxt}` +
                            `━━━━━━━━━━━━━━━━━━━\n` +
                            `💰 PAYMENT SUMMARY\n` +
                            `• Grand Total: ₹${grandTotal}\n\n` +
                            `🏔️ Soul Cafe, Tosh`;

            window.open(`https://wa.me/917023207620?text=${encodeURIComponent(message)}`);
            CART = {}; closeModals(); updateUI();
        };

        window.openManager = () => { if(localStorage.getItem('isSoulAdmin') === 'true') document.getElementById('manager-modal').classList.remove('hidden'); else document.getElementById('login-modal').classList.remove('hidden'); };
        window.doLogin = () => { if(document.getElementById('mgr-pass').value === MASTER_PASS) { localStorage.setItem('isSoulAdmin', 'true'); document.getElementById('login-modal').classList.add('hidden'); document.getElementById('manager-modal').classList.remove('hidden'); } else alert("Invalid Password"); };
        window.doLogout = () => { localStorage.removeItem('isSoulAdmin'); location.reload(); };
        window.closeModals = () => { document.querySelectorAll('[id$="-modal"]').forEach(m => m.classList.add('hidden')); };

        window.addCategory = async () => {
            const name = document.getElementById('mgr-new-cat').value.trim();
            if(!name) return;
            await setDoc(doc(db, "menu", name), { category: name, items: [], order: MENU_DATA.length });
            document.getElementById('mgr-new-cat').value = '';
        };

        window.reorder = async (index, direction) => {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= MENU_DATA.length) return;
            const batch = writeBatch(db);
            batch.set(doc(db, "menu", MENU_DATA[index].category), { ...MENU_DATA[index], order: targetIndex });
            batch.set(doc(db, "menu", MENU_DATA[targetIndex].category), { ...MENU_DATA[targetIndex], order: index });
            await batch.commit();
        };

        window.saveDish = async () => {
            const name = document.getElementById('dish-name').value.trim();
            const price = parseInt(document.getElementById('dish-price').value);
            const cat = document.getElementById('dish-cat').value;
            const veg = document.getElementById('dish-veg').value === "true";
            const desc = document.getElementById('dish-desc').value.trim();
            if(!name || !price) return;
            const section = MENU_DATA.find(s => s.category === cat);
            section.items.push({ name, price, isVeg: veg, desc, unavailable: false });
            await setDoc(doc(db, "menu", cat), section);
            document.getElementById('dish-name').value = ''; document.getElementById('dish-price').value = '';
        };

        function renderManagerData() {
            document.getElementById('mgr-sort-list').innerHTML = MENU_DATA.map((c, i) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-lg border text-xs">
                    <span class="font-bold">${c.category}</span>
                    <div class="flex gap-2">
                        <button onclick="window.reorder(${i}, -1)">↑</button>
                        <button onclick="window.reorder(${i}, 1)">↓</button>
                        <button onclick="window.deleteCat('${c.category}')" class="text-red-500 font-bold ml-2">×</button>
                    </div>
                </div>`).join('');
            document.getElementById('dish-cat').innerHTML = MENU_DATA.map(c => `<option value="${c.category}">${c.category}</option>`).join('');
            document.getElementById('mgr-inventory').innerHTML = MENU_DATA.map(cat => `
                <div class="bg-white p-4 rounded-xl border">
                    <h5 class="text-[10px] font-black uppercase mb-3 text-[#1b4332] border-b pb-1">${cat.category}</h5>
                    ${cat.items.map((it, i) => `
                        <div class="flex items-center justify-between text-xs py-1 border-t border-gray-50">
                            <span>${it.name}</span>
                            <button onclick="window.deleteDish('${cat.category}', ${i})" class="text-red-500 font-bold">×</button>
                        </div>`).join('')}
                </div>`).join('');
        }

        window.deleteDish = async (cat, idx) => { if(!confirm("Delete dish?")) return; const sec = MENU_DATA.find(s => s.category === cat); sec.items.splice(idx, 1); await setDoc(doc(db, "menu", cat), sec); };
        window.deleteCat = async (name) => { if(confirm(`Delete category "${name}"?`)) await deleteDoc(doc(db, "menu", name)); };

        init();
    </script>
</body>
</html>
