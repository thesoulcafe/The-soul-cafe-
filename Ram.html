<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soul Cafe - Tosh | Menu</title>
    
    <meta name="description" content="The Soul Cafe in Tosh, Parvati Valley. Freshly prepared Himalayan delicacies, local trek guides, and a peaceful mountain vibe.">
    <meta property="og:title" content="The Soul Cafe - Tosh | Menu & Trek Guide">
    <meta property="og:description" content="Order fresh food and explore local treks in Tosh. Your soul's retreat in the Himalayas.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --forest-green: #1b4332;
            --wood-brown: #5d4037;
            --warm-cream: #fdf5e6;
            --accent-gold: #e6b17e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--warm-cream);
            color: #2d2d2d;
            scroll-behavior: smooth;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .dish-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-left: 4px solid #e6b17e;
            background: var(--card-bg, #fff);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .dish-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 0 2px #e6b17e, 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }
        
        .modal-backdrop {
            backdrop-filter: blur(8px);
            background-color: rgba(0, 0, 0, 0.6);
        }

        #landing-view {
            position: fixed;
            inset: 0;
            z-index: 100; /* Landing is base layer 100 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #landing-view::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(27,67,50,0.95));
        }
        #landing-view.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-18px);
        }
        .landing-inner { position: relative; z-index: 2; text-align: center; color: white; }
        
        .landing-btn {
            padding: 1rem 1.5rem;
            border-radius: 999px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .landing-btn:hover { transform: translateY(-4px); }

        #app-wrapper {
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
        }
        #app-wrapper.visible { display: block; opacity: 1; }

        .view-panel { display: none; opacity: 0; transform: translateY(14px); transition: all 0.45s ease; }
        .view-panel.active { display: block; opacity: 1; transform: translateY(0); }

        /* Modified Z-Indexes for Modals to ensure they are on top of landing view */
        #login-modal { z-index: 200; }
        #manager-modal { z-index: 210; }
        #checkout-modal { z-index: 150; }
        #order-history-modal { z-index: 160; }
        #lightbox { z-index: 300; }
        
        .spa-tab {
            padding: 0.55rem 1.4rem;
            border-radius: 999px;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.35);
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="landing-inner">
            <p class="uppercase tracking-[0.35em] text-[#e6b17e] text-xs mb-4">Tosh · Parvati Valley</p>
            <h1 class="text-6xl font-bold mb-4">The Soul Cafe</h1>
            <div class="flex items-center justify-center gap-2 text-white/75 italic mb-12">
                <i data-lucide="map-pin" class="w-4 h-4"></i> 2400m · Heart of the Mountains
            </div>
            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md px-6">
                <button class="landing-btn bg-[#e6b17e] text-[#1b4332] flex-1" onclick="showView('menu')">Our Menu</button>
                <button class="landing-btn border-2 border-white/50 text-white flex-1" onclick="showView('trek')">Trek Guide</button>
            </div>
        </div>
        
        <div class="absolute bottom-8 w-full text-center z-10">
            <button onclick="openLoginModal()" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-full bg-[#1b4332] text-white text-xs font-bold hover:bg-[#2d5a44] transition-all shadow-lg border border-white/20">
                <i data-lucide="lock" class="w-3.5 h-3.5"></i>
                Manager Login
            </button>
        </div>
    </div>

    <div id="app-wrapper">
        <header class="relative h-[30vh] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070'); filter: brightness(0.5);"></div>
            <div class="relative z-10 text-center">
                <h1 class="text-4xl font-bold text-white">The Soul Cafe</h1>
                <div class="mt-4 flex justify-center">
                    <button class="spa-tab" onclick="showLanding()">← Back Home</button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 py-10">
            <div id="view-menu" class="view-panel active">
                <h2 class="text-3xl font-bold text-[#1b4332] text-center mb-8">Our Menu</h2>
                <div id="menu-sections" class="grid gap-6"></div>
            </div>
            <div id="view-trek" class="view-panel">
                <h2 class="text-3xl font-bold text-[#1b4332] text-center mb-8">Trek Guide</h2>
                <div id="trek-list" class="grid gap-6"></div>
            </div>
        </main>
    </div>

    <div id="login-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeLoginModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
            <h3 class="text-2xl font-bold text-[#1b4332] mb-6 text-center">Manager Access</h3>
            <input type="password" id="manager-password" placeholder="Manager Password" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-[#1b4332] outline-none mb-4">
            <button onclick="attemptLogin()" class="w-full bg-[#1b4332] text-white py-3 rounded-xl font-bold hover:bg-[#2d5a44] transition-all">Sign In</button>
            <button onclick="closeLoginModal()" class="w-full mt-2 text-gray-400 text-sm">Cancel</button>
        </div>
    </div>

    <div id="manager-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeManagerModal()"></div>
        <div class="relative w-full max-w-4xl bg-[#fdf5e6] rounded-3xl shadow-2xl overflow-hidden h-[85vh] flex flex-col">
            <div class="p-6 bg-[#1b4332] text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Manager Dashboard</h3>
                <button onclick="handleSignOut()" class="text-sm bg-white/10 px-4 py-2 rounded-lg">Sign Out</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6" id="manager-items-list">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase config omitted for brevity, ensure your credentials are here.
        const app = initializeApp({ /* YOUR CONFIG */ });
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isManager = false;

        window.showView = function(view) {
            const landing = document.getElementById('landing-view');
            landing.classList.add('hide');
            setTimeout(() => { landing.style.display = 'none'; }, 600);

            const appWrap = document.getElementById('app-wrapper');
            appWrap.style.display = 'block';
            requestAnimationFrame(() => appWrap.classList.add('visible'));

            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
        };

        window.showLanding = function() {
            const landing = document.getElementById('landing-view');
            landing.style.display = 'flex';
            requestAnimationFrame(() => landing.classList.remove('hide'));
            document.getElementById('app-wrapper').classList.remove('visible');
        };

        window.openLoginModal = function() {
            document.getElementById('login-modal').classList.remove('hidden');
        };

        window.closeLoginModal = function() {
            document.getElementById('login-modal').classList.add('hidden');
        };

        window.closeManagerModal = function() {
            document.getElementById('manager-modal').classList.add('hidden');
        };

        window.attemptLogin = async function() {
            const pwd = document.getElementById('manager-password').value;
            if (pwd === 'Tosh@2025') {
                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithPopup(auth, provider);
                } catch (e) { alert("Login failed: " + e.message); }
            } else { alert("Incorrect password"); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                isManager = true;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('manager-modal').classList.remove('hidden');
                
                // CRITICAL UPDATE: Automatically hide landing page on successful login
                const landing = document.getElementById('landing-view');
                if (!landing.classList.contains('hide')) {
                    landing.classList.add('hide');
                    setTimeout(() => { landing.style.display = 'none'; }, 600);
                    const appWrap = document.getElementById('app-wrapper');
                    appWrap.style.display = 'block';
                    appWrap.classList.add('visible');
                }
            } else {
                isManager = false;
                document.getElementById('manager-modal').classList.add('hidden');
            }
        });

        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
