    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --cafe-cream: #F9F5F0; --cafe-green: #1B3022; --cafe-gold: #D4A373; }
        body { font-family: 'Inter', sans-serif; background-color: var(--cafe-cream); color: var(--cafe-green); -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* Custom UI Styles */
        .item-card { background: white; transition: all 0.2s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .floating-footer { transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .footer-visible { transform: translateY(0); }

        /* Admin Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25D366; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>

        // RENDER FUNCTIONS
        function renderMenu() {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('category-nav');
            const activeItems = menuItems.filter(i => i.available);
            const categories = [...new Set(activeItems.map(i => i.category))];

            nav.innerHTML = categories.map(cat => `
                <a href="#cat-${cat.replace(/\s/g,'')}" class="bg-white px-5 py-2 rounded-full text-xs font-bold shadow-sm border whitespace-nowrap">${cat}</a>
            `).join('');

            container.innerHTML = categories.map(cat => `
                <section id="cat-${cat.replace(/\s/g,'')}">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><span class="w-2 h-8 bg-[#D4A373] rounded-full"></span>${cat}</h2>
                    <div class="grid gap-4">
                        ${activeItems.filter(i => i.category === cat).map(item => `
                            <div class="item-card p-5 rounded-3xl flex justify-between items-center shadow-sm">
                                <div class="flex-1 pr-4">
                                    <h3 class="font-bold text-base leading-tight">${item.name}</h3>
                                    <p class="text-[#D4A373] font-bold mt-1">₹${item.price}</p>
                                </div>
                                <div class="flex items-center gap-4 bg-gray-50 rounded-2xl p-1 border">
                                    <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm font-bold">-</button>
                                    <span id="qty-${item.id}" class="w-4 text-center font-bold">${cart[item.id] || 0}</span>
                                    <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-[#1B3022] text-white shadow-sm font-bold">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        function updateQty(id, delta) {
            cart[id] = Math.max(0, (cart[id] || 0) + delta);
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateFooter();
        }

        function updateFooter() {
            const total = menuItems.reduce((sum, item) => sum + ((cart[item.id] || 0) * item.price), 0);
            document.getElementById('footer-total').innerText = `₹${total}`;
            const footer = document.getElementById('order-footer');
            total > 0 ? footer.classList.add('footer-visible') : footer.classList.remove('footer-visible');
        }

        // ADMIN PANEL LOGIC
        function openAdminModal() {
            const list = document.getElementById('admin-list');
            list.innerHTML = menuItems.map(item => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border mb-2">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${item.name}</p>
                        <input type="number" value="${item.price}" onchange="updatePrice(${item.id}, this.value)" class="w-20 text-sm border-b font-bold text-[#D4A373] outline-none">
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleAvailability(${item.id})">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function toggleAvailability(id) {
            const item = menuItems.find(i => i.id === id);
            item.available = !item.available;
            if(!item.available) cart[id] = 0;
            updateFooter();
        }

        function updatePrice(id, val) {
            const item = menuItems.find(i => i.id === id);
            item.price = parseInt(val) || 0;
            updateFooter();
        }

        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); renderMenu(); }

        // CHECKOUT & WHATSAPP REDIRECT
        function openCheckoutModal() { document.getElementById('checkout-modal').classList.remove('hidden'); }
        function closeCheckoutModal() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name').value.trim();
            if(!name) { alert("Please enter your name"); return; }

            let orderItemsText = "";
            let totalAmount = 0;

            menuItems.forEach(item => {
                const qty = cart[item.id] || 0;
                if (qty > 0) {
                    orderItemsText += `• ${qty} x ${item.name}\n`;
                    totalAmount += (qty * item.price);
                }
            });

            // Added Preparation Note to message
            const message = `*New Order from ${name}*\n--------------------------\n${orderItemsText}--------------------------\n*Total: ₹${totalAmount}*\n\n_(Note: Waiting 30 mins for preparation)_`;
            
            const encodedMessage = encodeURIComponent(message);
            const link = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;
            
            // Redirect directly to bypass browser blocks
            window.location.href = link;
        }

        renderMenu();
