<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soul Cafe Menu</title>
    <script>
        // Function to load menu from localStorage
        function loadMenu() {
            let menu = localStorage.getItem('menu');
            if (menu) {
                document.getElementById('menu').innerHTML = menu;
            }
        }

        // Function to save menu to localStorage
        function saveMenu() {
            let menu = document.getElementById('menu').innerHTML;
            localStorage.setItem('menu', menu);
        }

        // Function to add a new dish
        function addDish() {
            let dish = document.getElementById('newDish').value;
            if (dish) {
                let menu = document.getElementById('menu');
                let newDishElement = document.createElement('li');
                newDishElement.textContent = dish;
                menu.appendChild(newDishElement);
                saveMenu(); // Save the updated menu
                document.getElementById('newDish').value = ''; // Clear input
            }
        }

        window.onload = loadMenu; // Load menu on page load
    </script>
</head>
<body>
    <h1>The Soul Cafe Menu</h1>
    <ul id="menu">
        <li>Espresso</li>
        <li>Cappuccino</li>
        <li>Latte</li>
    </ul>
    <input type="text" id="newDish" placeholder="Add a new dish">
    <button onclick="addDish()">Add Dish</button>
</body>
</html>
