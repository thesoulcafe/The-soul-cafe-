<script>
// Function to save menu to localStorage
function saveMenuToLocalStorage() {
    const menu = getMenu(); // Function to get the current menu
    localStorage.setItem('menu', JSON.stringify(menu));
}

// Function to load menu from localStorage
function loadMenuFromLocalStorage() {
    const menu = JSON.parse(localStorage.getItem('menu'));
    if (menu) {
        setMenu(menu); // Function to set the menu on the page
    }
}

// Function to add a new dish
function addNewDish(dish) {
    const menu = getMenu();
    menu.push(dish);
    setMenu(menu);
    saveMenuToLocalStorage();
}

// Function to delete a dish
function deleteDish(dishName) {
    let menu = getMenu();
    menu = menu.filter(dish => dish.name !== dishName);
    setMenu(menu);
    saveMenuToLocalStorage();
}

// Load saved menu on page refresh
window.onload = function() {
    loadMenuFromLocalStorage();
};

// Call saveMenuToLocalStorage whenever there are changes to the menu
// Assuming there are event listeners or functions modifying the menu
</script>
