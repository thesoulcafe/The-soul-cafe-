<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soul Cafe - Tosh | Menu & Trek Guide</title>
    
    <meta name="description" content="The Soul Cafe in Tosh, Parvati Valley. Freshly prepared Himalayan delicacies, local trek guides, and a peaceful mountain vibe.">
    <meta property="og:title" content="The Soul Cafe - Tosh | Menu & Trek Guide">
    <meta property="og:description" content="Order fresh food and explore local treks in Tosh. Your soul's retreat in the Himalayas.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --forest-green: #1b4332;
            --wood-brown: #5d4037;
            --warm-cream: #fdf5e6;
            --accent-gold: #e6b17e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--warm-cream);
            color: #2d2d2d;
            scroll-behavior: smooth;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .dish-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-left: 4px solid #e6b17e;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .dish-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }

        /* SPA LANDING & VIEW TRANSITIONS */
        #landing-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #landing-view::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(27,67,50,0.9) 100%);
        }
        #landing-view.hide { opacity: 0; pointer-events: none; transform: translateY(-20px); }
        
        .landing-inner { position: relative; z-index: 2; text-align: center; padding: 2rem; width: 100%; max-width: 600px; }
        .landing-title { font-size: clamp(3rem, 10vw, 5rem); font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 1rem; }
        
        .landing-btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .landing-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary { background: var(--accent-gold); color: var(--forest-green); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
        .btn-manager { background: transparent; color: rgba(255,255,255,0.6); font-size: 0.8rem; border: 1px dashed rgba(255,255,255,0.3); margin-top: 1rem; }
        
        .landing-btn:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        #app-wrapper { display: none; opacity: 0; transition: opacity 0.5s ease; }
        #app-wrapper.visible { display: block; opacity: 1; }

        .view-panel { display: none; }
        .view-panel.active { display: block; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal-backdrop { backdrop-filter: blur(8px); background: rgba(0,0,0,0.6); }
        .back-to-top { position: fixed; bottom: 2rem; right: 2rem; z-index: 40; background: var(--forest-green); color: white; width: 3.5rem; height: 3.5rem; border-radius: 50%; display: flex; items-center: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .back-to-top.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="landing-inner">
            <p class="text-accent-gold uppercase tracking-[0.4em] text-sm mb-4 text-[#e6b17e]">Tosh • Parvati Valley</p>
            <h1 class="landing-title">The Soul Cafe</h1>
            <p class="text-white/70 italic mb-8">Authentic Himalayan Flavors & Mountain Treks</p>
            
            <div class="landing-btn-group">
                <button class="landing-btn btn-primary" onclick="showView('menu')">
                    <i data-lucide="utensils-crosses"></i> View Menu
                </button>
                <button class="landing-btn btn-secondary" onclick="showView('trek')">
                    <i data-lucide="mountain"></i> Trek Guide
                </button>
                <button class="landing-btn btn-manager" onclick="openLoginModal()">
                    <i data-lucide="lock" class="w-4 h-4"></i> Manager Login
                </button>
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        <header class="relative h-[30vh] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070'); filter: brightness(0.5);"></div>
            <div class="relative z-10 text-center text-white">
                <h2 class="text-4xl font-bold mb-2">The Soul Cafe</h2>
                <button onclick="showLanding()" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 text-xs font-bold uppercase tracking-widest hover:bg-white/20 transition-all">
                    ← Back to Home
                </button>
            </div>
        </header>

        <nav id="category-nav" class="sticky top-0 z-30 bg-[#1b4332] text-white shadow-md overflow-x-auto no-scrollbar">
            <div class="flex whitespace-nowrap px-4 py-4 gap-6 max-w-5xl mx-auto" id="nav-items"></div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 py-12">
            <div id="view-menu" class="view-panel active">
                <div class="mb-12 text-center">
                    <h2 class="text-3xl font-bold text-[#1b4332]">Our Menu</h2>
                    <div class="mt-6 max-w-md mx-auto relative">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="menu-search" oninput="handleSearch()" placeholder="Search dishes..." class="w-full pl-12 pr-4 py-3 rounded-2xl border-2 border-[#1b4332]/10 focus:border-[#1b4332] outline-none bg-white">
                    </div>
                </div>
                <div id="menu-sections"></div>
            </div>

            <div id="view-trek" class="view-panel">
                <div class="mb-12 text-center">
                    <h2 class="text-3xl font-bold text-[#1b4332]">Local Trek Guide</h2>
                    <p class="text-gray-600 mt-2">Discover the hidden gems of Parvati Valley</p>
                </div>
                <div id="trek-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>
        </main>

        <footer class="bg-[#1b4332] text-white py-12 mt-20">
            <div class="max-w-5xl mx-auto px-4 text-center">
                <p class="text-xl font-bold mb-4">The Soul Cafe, Tosh</p>
                <p class="text-white/60 italic">"Eat well, trek far, sleep deep."</p>
                <div class="mt-8 flex justify-center gap-6">
                    <a href="#" class="hover:text-[#e6b17e] transition-colors"><i data-lucide="instagram"></i></a>
                    <a href="#" class="hover:text-[#e6b17e] transition-colors"><i data-lucide="facebook"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <button id="cart-btn" class="fixed bottom-8 right-8 z-40 bg-[#1b4332] text-white p-4 px-6 rounded-full shadow-2xl flex items-center gap-4 hover:scale-105 transition-all hidden">
        <div class="relative"><i data-lucide="shopping-bag"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#e6b17e] text-[#1b4332] text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#1b4332]">0</span></div>
        <span class="font-bold">Total: <span id="cart-total">₹0</span></span>
    </button>

    <button id="back-to-top" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i data-lucide="chevron-up"></i>
    </button>

    <div id="login-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-backdrop" onclick="closeLoginModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 text-center">
            <div class="w-16 h-16 bg-[#1b4332]/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="user-cog" class="w-8 h-8 text-[#1b4332]"></i>
            </div>
            <h3 class="text-2xl font-bold text-[#1b4332] mb-2">Manager Access</h3>
            <p class="text-gray-500 text-sm mb-6">Enter password to manage menu and treks</p>
            <input type="password" id="manager-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-[#1b4332] outline-none text-center mb-4 tracking-widest">
            <button onclick="attemptLogin()" class="w-full bg-[#1b4332] text-white py-3 rounded-xl font-bold hover:bg-[#2d5a44] transition-all">Sign In</button>
            <button onclick="closeLoginModal()" class="mt-4 text-gray-400 text-sm">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "gen-lang-client-0775483264",
            appId: "1:40091504848:web:43f466554f379231620ed5",
            apiKey: "AIzaSyBkR2MeWHwOG55lb5TkEJSeFuPfF1ZL6Vk"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, {}, "ai-studio-4ce66396-f81d-4d93-944e-3f363b09c805");

        let MENU_DATA = [];
        let TREK_DATA = [];
        let cart = {};

        // INITIALIZE DATA
        async function startListeners() {
            onSnapshot(collection(db, "menu"), (snapshot) => {
                MENU_DATA = [];
                snapshot.forEach(doc => MENU_DATA.push(doc.data()));
                MENU_DATA.sort((a,b) => (a.sortOrder || 0) - (b.sortOrder || 0));
                renderMenu();
                renderNav();
            });

            onSnapshot(collection(db, "treks"), (snapshot) => {
                TREK_DATA = [];
                snapshot.forEach(doc => TREK_DATA.push({ id: doc.id, ...doc.data() }));
                renderTreks();
            });
        }

        // SPA NAVIGATION
        window.showView = function(view) {
            document.getElementById('landing-view').classList.add('hide');
            const appWrap = document.getElementById('app-wrapper');
            appWrap.style.display = 'block';
            setTimeout(() => appWrap.classList.add('visible'), 50);

            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            
            document.getElementById('category-nav').style.display = (view === 'menu' ? 'block' : 'none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        };

        window.showLanding = function() {
            document.getElementById('app-wrapper').classList.remove('visible');
            setTimeout(() => {
                document.getElementById('app-wrapper').style.display = 'none';
                document.getElementById('landing-view').classList.remove('hide');
            }, 500);
        };

        // RENDERERS
        function renderNav() {
            const nav = document.getElementById('nav-items');
            nav.innerHTML = MENU_DATA.map(cat => `
                <button onclick="scrollToSection('section-${cat.category.replace(/\s+/g, '-')}')" class="text-sm font-bold uppercase tracking-wider text-white/70 hover:text-white transition-all">
                    ${cat.category}
                </button>
            `).join('');
        }

        window.scrollToSection = (id) => {
            const el = document.getElementById(id);
            if (el) window.scrollTo({ top: el.offsetTop - 100, behavior: 'smooth' });
        };

        function renderMenu(search = '') {
            const container = document.getElementById('menu-sections');
            container.innerHTML = MENU_DATA.map(cat => {
                const filteredItems = cat.items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));
                if (filteredItems.length === 0) return '';
                
                return `
                    <section id="section-${cat.category.replace(/\s+/g, '-')}" class="mb-12">
                        <h3 class="text-2xl font-bold text-[#1b4332] mb-6 border-b border-gray-200 pb-2">${cat.category}</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${filteredItems.map(item => `
                                <div class="dish-card p-6" style="--card-bg: #fff">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <span class="text-[10px] font-bold uppercase tracking-widest ${item.isVeg ? 'text-green-600' : 'text-red-600'}">${item.isVeg ? '🟢 Veg' : '🔴 Non-Veg'}</span>
                                            <h4 class="text-lg font-bold text-gray-800">${item.name}</h4>
                                        </div>
                                        <span class="text-xl font-black text-[#1b4332]">₹${item.price}</span>
                                    </div>
                                    <button onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price})" class="w-full py-2 bg-[#1b4332] text-white rounded-xl text-sm font-bold hover:bg-[#e6b17e] hover:text-[#1b4332] transition-all">Add to Cart</button>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderTreks() {
            const container = document.getElementById('trek-list');
            container.innerHTML = TREK_DATA.map(trek => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                    <img src="${trek.images ? trek.images[0] : 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b'}" class="h-64 w-full object-cover">
                    <div class="p-8 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-bold text-[#1b4332]">${trek.name}</h3>
                            <span class="bg-[#e6b17e]/20 text-[#8b5e3c] text-[10px] font-bold px-3 py-1 rounded-full uppercase">${trek.difficulty}</span>
                        </div>
                        <p class="text-gray-600 mb-6 flex-1">${trek.desc || 'Explore this beautiful trail in the heart of Tosh.'}</p>
                        <div class="flex items-center gap-6 mb-8 text-sm text-gray-500 font-medium">
                            <div class="flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i> ${trek.duration}</div>
                            <div class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> ${trek.distance || 'Varies'}</div>
                        </div>
                        
                        <button onclick="handleTrekGuidance('${trek.name.replace(/'/g, "\\'")}')" class="w-full py-5 bg-[#1b4332] text-white rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-[#25D366] transition-all shadow-lg active:scale-95">
                            <i data-lucide="message-circle" class="w-6 h-6"></i>
                            Get Professional Guide
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // CART LOGIC
        window.addToCart = (name, price) => {
            cart[name] = (cart[name] || 0) + 1;
            updateCartUI();
        };

        function updateCartUI() {
            const count = Object.values(cart).reduce((a,b) => a+b, 0);
            const total = Object.keys(cart).reduce((sum, name) => {
                const item = MENU_DATA.flatMap(c => c.items).find(i => i.name === name);
                return sum + (item ? item.price * cart[name] : 0);
            }, 0);

            const btn = document.getElementById('cart-btn');
            if (count > 0) {
                btn.classList.remove('hidden');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = '₹' + total;
            } else {
                btn.classList.add('hidden');
            }
        }

        window.handleTrekGuidance = (name) => {
            const msg = encodeURIComponent(`Hi! I'm at Soul Cafe Tosh and I'm interested in the *${name}* trek. Can you provide a guide?`);
            window.open(`https://wa.me/917023207620?text=${msg}`, '_blank');
        };

        window.handleSearch = () => {
            const query = document.getElementById('menu-search').value;
            renderMenu(query);
        };

        // LOGIN MODAL LOGIC
        window.openLoginModal = () => document.getElementById('login-modal').classList.remove('hidden');
        window.closeLoginModal = () => document.getElementById('login-modal').classList.add('hidden');
        window.attemptLogin = () => {
            if (document.getElementById('manager-password').value === "SoulCafeTosh@2024") {
                alert("Login successful! Loading dashboard...");
                // Redirect or open manager view here
            } else {
                alert("Incorrect Password");
            }
        };

        // SCROLL REVEAL
        window.addEventListener('scroll', () => {
            const btt = document.getElementById('back-to-top');
            if (window.pageYOffset > 400) btt.classList.add('show');
            else btt.classList.remove('show');
        });

        startListeners();
        lucide.createIcons();
    </script>
</body>
</html>
