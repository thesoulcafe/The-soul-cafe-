<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Soul Cafe | Live Menu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --cafe-cream: #F9F5F0; --cafe-green: #1B3022; --cafe-gold: #D4A373; }
        body { font-family: 'Inter', sans-serif; background-color: var(--cafe-cream); color: var(--cafe-green); -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .item-card { background: white; transition: all 0.2s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .floating-footer { transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .footer-visible { transform: translateY(0); }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #25D366; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="pb-32">

    <header class="pt-10 pb-4 px-6 text-center">
        <div class="inline-block relative group cursor-pointer" onclick="openAdminModal()">
            <div class="w-20 h-20 bg-[#1B3022] rounded-full mx-auto flex items-center justify-center border-4 border-[#D4A373] shadow-lg mb-4 active:scale-90 transition-transform">
                <span class="text-white text-2xl font-bold italic">SC</span>
            </div>
            <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-[#D4A373] text-[8px] text-white px-2 py-0.5 rounded-full uppercase font-bold opacity-0 group-hover:opacity-100 transition-opacity">Manager Mode</span>
        </div>
        <h1 class="text-4xl font-bold italic mb-1">The Soul Cafe</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] opacity-60">Handcrafted & Freshly Served</p>
    </header>

    <nav class="sticky top-0 z-30 bg-[#F9F5F0]/90 backdrop-blur-md py-4 border-b border-gray-100 px-4 overflow-x-auto no-scrollbar flex gap-2 shadow-sm">
        <div id="category-nav" class="flex gap-2"></div>
    </nav>

    <main class="max-w-md mx-auto px-5 mt-8 space-y-12" id="menu-container">
        <div class="text-center py-20 opacity-40 italic">Loading fresh menu...</div>
    </main>

    <div id="order-footer" class="fixed bottom-0 left-0 right-0 p-5 floating-footer z-40">
        <div class="max-w-md mx-auto bg-[#1B3022] text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase tracking-widest opacity-60">Total Bill</p>
                <p class="text-2xl font-bold" id="footer-total">₹0</p>
            </div>
            <button onclick="openCheckoutModal()" class="bg-[#D4A373] px-8 py-3 rounded-xl font-bold text-sm uppercase tracking-wider shadow-lg active:scale-95 transition-transform">View Order</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h3 class="text-xl font-bold italic">Menu Manager</h3>
                <button onclick="closeAdminModal()" class="text-gray-400 text-2xl">✕</button>
            </div>
            <div class="p-4 overflow-y-auto space-y-4 bg-gray-100" id="admin-list"></div>
            <div class="p-6 border-t">
                <button onclick="closeAdminModal()" class="w-full bg-[#1B3022] text-white py-4 rounded-xl font-bold shadow-lg">Done</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl p-8 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-bold">Final Order</h3>
                <button onclick="closeCheckoutModal()" class="text-gray-400">✕</button>
            </div>
            <div class="bg-amber-50 border-l-4 border-[#D4A373] p-4 mb-6 rounded-r-xl">
                <p class="text-xs text-amber-900 font-semibold">Fresh food takes <span class="text-[#D4A373] font-bold underline">30 minutes</span> for preparation.</p>
            </div>
            <div class="space-y-6">
                <input type="text" id="cust-name" placeholder="Enter your name" class="w-full bg-gray-50 border-2 rounded-2xl px-5 py-4 outline-none focus:border-[#D4A373]">
                <button onclick="sendWhatsApp()" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 text-lg shadow-xl active:scale-95 transition-transform">Confirm Order</button>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION (Replace these with your keys from Firebase Console)
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "your-app.firebaseapp.com",
            databaseURL: "https://your-app-default-rtdb.firebaseio.com",
            projectId: "your-app",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "0000000000",
            appId: "1:0000000000:web:000000000"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const WHATSAPP_NUMBER = "917023207620"; 

        let menuItems = [];
        let cart = {};

        // 2. LIVE DATA SYNC
        function initApp() {
            db.ref('menu').on('value', (snapshot) => {
                const data = snapshot.val();
                // Map object keys to IDs if data exists
                menuItems = data ? Object.entries(data).map(([id, val]) => ({...val, id})) : [];
                renderMenu();
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('category-nav');
            if (menuItems.length === 0) {
                container.innerHTML = `<div class="text-center py-10">No items found. Open Manager Mode to add dishes!</div>`;
                return;
            }

            const activeItems = menuItems.filter(i => i.available);
            const categories = [...new Set(activeItems.map(i => i.category))];

            nav.innerHTML = categories.map(cat => `
                <button onclick="document.getElementById('cat-${cat.replace(/\s/g,'')}').scrollIntoView({behavior:'smooth'})" 
                        class="bg-white px-5 py-2 rounded-full text-xs font-bold shadow-sm border whitespace-nowrap">${cat}</button>
            `).join('');

            container.innerHTML = categories.map(cat => `
                <section id="cat-${cat.replace(/\s/g,'')}">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><span class="w-2 h-8 bg-[#D4A373] rounded-full"></span>${cat}</h2>
                    <div class="grid gap-4">
                        ${activeItems.filter(i => i.category === cat).map(item => `
                            <div class="item-card p-5 rounded-3xl flex justify-between items-center shadow-sm">
                                <div class="flex-1 pr-4">
                                    <h3 class="font-bold text-base leading-tight">${item.name}</h3>
                                    <p class="text-[#D4A373] font-bold mt-1">₹${item.price}</p>
                                </div>
                                <div class="flex items-center gap-4 bg-gray-50 rounded-2xl p-1 border">
                                    <button onclick="updateQty('${item.id}', -1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm font-bold">-</button>
                                    <span id="qty-${item.id}" class="w-4 text-center font-bold">${cart[item.id] || 0}</span>
                                    <button onclick="updateQty('${item.id}', 1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-[#1B3022] text-white shadow-sm font-bold">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        // 3. ADMIN FUNCTIONS
        function openAdminModal() {
            const list = document.getElementById('admin-list');
            
            // Add New Dish UI
            let html = `
                <div class="bg-white p-5 rounded-3xl shadow-sm border-2 border-dashed border-[#D4A373]">
                    <p class="font-bold text-sm mb-3 text-[#1B3022]">Add New Item</p>
                    <div class="space-y-2">
                        <input id="new-name" placeholder="Item Name" class="w-full p-3 text-sm rounded-xl border outline-none">
                        <div class="flex gap-2">
                            <input id="new-price" type="number" placeholder="Price" class="w-1/2 p-3 text-sm rounded-xl border outline-none">
                            <select id="new-cat" class="w-1/2 p-3 text-sm rounded-xl border outline-none bg-white">
                                <option>Starter</option><option>Soups</option><option>Toast</option><option>Lassi</option>
                                <option>Hot Beverage</option><option>Cereals</option><option>Omelette</option>
                                <option>Prantha</option><option>Pasta</option><option>Pizza</option>
                                <option>Indian Zaika</option><option>Breads</option><option>Rice</option>
                                <option>Salad</option><option>Thali</option><option>Dessert</option>
                            </select>
                        </div>
                        <button onclick="addNewDish()" class="w-full bg-[#D4A373] text-white py-3 rounded-xl font-bold text-sm">Save to Global Menu</button>
                    </div>
                </div>
                <h4 class="font-bold text-xs uppercase tracking-widest text-gray-400 mt-6 px-2">Manage Existing</h4>
            `;

            // List existing dishes
            html += menuItems.map(item => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${item.name}</p>
                        <input type="number" value="${item.price}" onchange="db.ref('menu/${item.id}').update({price: parseInt(this.value)})" 
                               class="w-20 text-sm border-b font-bold text-[#D4A373] outline-none">
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${item.available ? 'checked' : ''} onchange="db.ref('menu/${item.id}').update({available: !${item.available}})">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');
            
            list.innerHTML = html;
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function addNewDish() {
            const name = document.getElementById('new-name').value;
            const price = parseInt(document.getElementById('new-price').value);
            const category = document.getElementById('new-cat').value;

            if(name && price) {
                const newRef = db.ref('menu').push(); // Generates unique ID
                newRef.set({ name, price, category, available: true });
                alert("Successfully added to global menu!");
                openAdminModal(); 
            } else {
                alert("Please fill name and price.");
            }
        }

        // 4. CART LOGIC
        function updateQty(id, delta) {
            cart[id] = Math.max(0, (cart[id] || 0) + delta);
            const qtyLabel = document.getElementById(`qty-${id}`);
            if(qtyLabel) qtyLabel.innerText = cart[id];
            updateFooter();
        }

        function updateFooter() {
            const total = menuItems.reduce((sum, item) => sum + ((cart[item.id] || 0) * item.price), 0);
            document.getElementById('footer-total').innerText = `₹${total}`;
            const footer = document.getElementById('order-footer');
            total > 0 ? footer.classList.add('footer-visible') : footer.classList.remove('footer-visible');
        }

        function openCheckoutModal() { document.getElementById('checkout-modal').classList.remove('hidden'); }
        function closeCheckoutModal() { document.getElementById('checkout-modal').classList.add('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name').value.trim();
            if(!name) { alert("Please enter your name"); return; }
            let orderItemsText = "";
            let totalAmount = 0;
            menuItems.forEach(item => {
                const qty = cart[item.id] || 0;
                if (qty > 0) {
                    orderItemsText += `• ${qty} x ${item.name}\n`;
                    totalAmount += (qty * item.price);
                }
            });
            const message = `*New Order from ${name}*\n--------------------------\n${orderItemsText}--------------------------\n*Total: ₹${totalAmount}*\n\n_(Note: Waiting 30 mins for preparation)_`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
        }

        initApp();
    </script>
</body>
</html>
